<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session - Jasiri Gym</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">
</head>
<body>
     <nav>
    <h1 class="logo">Jasiri Gym</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="classes.html">Classes</a></li>
        <li><a href="booking.html">Book a Session</a></li>
    </ul>
    </nav>
    <section class="page-header">
        <h2>Book a Session</h2>
        <p>Fill in the form below to reserve your spot</p>
    </section>
    <section class="booking-section">
        <form id="bookingForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="e.g. Ivy Lulu" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="e.g. ivy@email.com" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 0712345678" required>
            </div>
            <div class="form-group">
                <label for="class">Select Class</label>
                <select id="class" required>
                    <option value="">--Choose a class--</option>
                <option value="Strength Training">Strength Training</option>
                <option value="Yoga">Yoga</option>
                <option value="Cardio">Cardio</option>
                <option value="Boxing">Boxing</option>
                <option value="Cycling">Cycling</option>
                <option value="Weightlifting">Weightlifting</option>
                <option value="Dance Fitness">Dance Fitness</option>           
                </select>
            </div>
            <div class="form-group">
                    <label for="date">Preferred Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="time">Preferred Time</label>
                    <select id="time" required>
                        <option value="">--Choose a Time--</option>
                        <option value="6:00 Am">6:00 AM</option>
                        <option value="7:00 AM">7:00AM</option>
                        <option value="8:00 AM">8:00AM</option>
                        <option value="9:00 AM">9:00AM</option>
                        <option value="10:00 AM">10:00 AM</option>
                        <option value="5:00 PM">5:00PM</option>
                        <option value="6:00 PM">6:00PM</option>
                    </select>
                </div>
                <button type="submit" class="btn">Confirm Booking</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 Jasiri Gym. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
