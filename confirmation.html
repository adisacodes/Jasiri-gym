<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Jasiri Gym</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">
</head>
<body>
     <nav>
    <h1 class="logo">Jasiri Gym</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="classes.html">Classes</a></li>
        <li><a href="booking.html">Book a Session</a></li>
    </ul>
    </nav>
    <section class="confirmation-section">
        <div class="confirmation-box">
            <h2>Booking Confirmed!</h2>
            <p class="confirmation-message">Thank you for booking your session with Jasiri Gym. Here are your booking details:</p>
            <div class="booking-details">
                <div class="detail-row">
                    <span class="detail-label">Name:</span>
                    <span class="detail-value" id="confirm-Name"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email:</span>
                    <span class="detail-value" id="confirm-Email"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phone:</span>
                    <span class="detail-value" id="confirm-Phone"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Class:</span>
                    <span class="detail-value" id="confirm-Class"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date:</span>
                    <span class="detail-value" id="confirm-Date"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Time:</span>
                    <span class="detail-value" id="confirm-Time"></span>
                </div>
            </div>
            <a href="index.html" class="btn">Back to Home</a>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Jasiri Gym. All rights reserved.</p>
    </footer>
    <script src="script.js"></script> 
</body>
</html>
